spring.datasource.url=jdbc:postgresql://localhost:5432/earthquakedb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

server.port=8080

# USGS API
usgs.api.url=https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_hour.geojson

# Earthquake filtering
earthquake.magnitude.threshold=2.0

# Scheduled USGS polling — every 60s by default
earthquake.polling.enabled=true
earthquake.polling.interval-ms=60000
earthquake.polling.initial-delay-ms=5000

# CORS — allow React dev server
spring.web.cors.allowed-origins=http://localhost:5173
