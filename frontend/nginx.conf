server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback: any unknown route serves index.html so React Router / deep
  # links keep working on full-page reloads.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Long-cache hashed build assets; never cache index.html.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
  location = /index.html {
    add_header Cache-Control "no-store";
  }
}
